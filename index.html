document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n    var feitos=Math.max(0, p._planoTreino - (Math.random()<0.28?1:0) - (Math.random()<0.1?1:0));\n    var alerta=(i===dates.length-2 && p._alertLast)?{flag:true,texto:p._alertText}:{flag:false,texto:\"\"};\n    var followups={};\n    if(scores.sono<=5) followups.sono=\"Dormi menos, acordei no meio da noite algumas vezes.\";\n    if(scores.adesao<=5) followups.adesao=\"Mais difícil nos fins de semana e em jantares fora.\";\n    if(feitos<p._planoTreino) followups.treino=\"Faltei ao treino de perna, correria no trabalho.\";\n    rows.push({id:p.id+\"-w\"+i,patientId:p.id,date:d.toISOString(),scores:scores,\n      metrics:{peso:peso,treinosFeitos:feitos,treinoPlanejado:p._planoTreino},\n      texto:(scores.geral>=7?pick(textPool.bom):pick(textPool.meio)),followups:followups,alerta:alerta,\n      triageStatus:(i<dates.length-1?\"analisado\":p._lastStatus),\n      nutriComment:(i<dates.length-2?\"Ótima evolução, seguimos com o ajuste combinado.\":\"\"),answered:true});\n  });\n  return rows;\n}\nfunction buildSeed(){\n  var P=[];\n  var a=makePatient(\"p1\",\"Amanda Santiago\",\"Recomposição corporal\",\"Platinum 6 meses\",\"#5B57D6\",\n    {altura:1.67,restr:\"Sem lactose\",start:{adesao:5,saciedade:5,sono:6,humor:6,recuperacao:5,digestao:6,agua:5,controle:5,tranquilidade:6,geral:5},end:{adesao:8,saciedade:8,sono:8,humor:9,recuperacao:8,digestao:8,agua:8,controle:8,tranquilidade:8,geral:8}},\n    4,3.0,88.2,-3.4,5); a._lastStatus=\"respondido\"; a._alertLast=false; P.push(a);\n  var b=makePatient(\"p2\",\"Bruno Carvalho\",\"Emagrecimento\",\"Premium 3 meses\",\"#A9723F\",\n    {altura:1.78,restr:\"Nenhuma\",start:{adesao:7,saciedade:6,sono:4,humor:6,recuperacao:5,digestao:7,agua:6,controle:6,tranquilidade:5,geral:6},end:{adesao:8,saciedade:7,sono:5,humor:7,recuperacao:6,digestao:7,agua:8,controle:7,tranquilidade:6,geral:7}},\n    5,4.0,96.0,-5.0,3); b._lastStatus=\"a_responder\"; b._alertLast=false; P.push(b);\n  var c=makePatient(\"p3\",\"Carla Mendes\",\"Hipertrofia (S.checkins)); store.set(\"raiz:links\",JSON.stringify(S.links)); }\nfunction loadOrSeed(){\n  var rp=store.get(\"raiz:patients\"), rc=store.get(\"raiz:checkins\"), rl=store.get(\"raiz:links\");\n  if(rp&&rc){ try{ S.patients=JSON.parse(rp); S.checkins=JSON.parse(rc); S.links=rl?JSON.parse(rl):[]; ensureLinks(); expireLinks(); return; }catch(e){} }\n  var s=buildSeed(); S.patients=s.patients; S.checkins=s.checkins; S.links=s.links; persist(); expireLinks();\n}\nfunction ensureLinks(){\n  if(S.links.length) return;\n  var thisWeek=fmtDay(lastSundays(1)[0]);\n  S.patients.forEach(function(p){\n    var l=latest(p.id); var answeredThis=l&&fmtDay(new Date(l.date))===thisWeek;\n    S.links.push(makeLink(p.id,weekNum(p),answeredThis?\"respondido\":\"enviado\"));\n  });\n  persist();\n}\n\n/* ---------- derive ---------- */\nfunction pOf(pid){ return S.patients.find(function(p){return p.id===pid;})||null; }\nfunction answeredFor(pid){ return S.checkins.filter(function(c){return c.patientId===pid&&c.answered;}).sort(function(a,b){return new Date(a.date)-new Date(b.date);}); }\nfunction latest(pid){ var a=answeredFor(pid); return a[a.length-1]||null; }\nfunction trendGeral(pid){ var a=answeredFor(pid); if(a.length<2) return 0; return (a[a.length-1].scores.geral||0)-(a[a.length-2].scores.geral||0); }\nfunction currentPatient(){ return pOf(S.selId)||S.patients[0]||null; }\n\n/* ============================================================\n   CHECK-IN LINKS · geração de link tokenizado + status\n   Status: gerado -> enviado -> respondido | expirado\n   ============================================================ */\nfunction hash6(str){ str=String(str); var h=5381; for(var i=0;i<str.length;i++){ h=((h*33)^str.charCodeAt(i))>>>0; } return (\"000000\"+h.toString(16)).slice(-6); }\nfunction weekNum(p){ var w=Math.floor((Date.now()-new Date(p.inicio).getTime())/6048e5)+1; return Math.max(1,w); }\nfunction linkURL(l){ return \"app.raiz.health/checkin/\"+l.token; }\nfunction makeLink(pid,semana,status,createdDate){\n  var created=createdDate?new Date(createdDate):new Date();\n  var exp=new Date(created.getTime()); exp.setDate(exp.getDate()+7);\n  var token=\"pt_\"+hash6(pid)+\"_s\"+semana+\"_\"+hash6(pid+\"|\"+semana+\"|\"+Math.random());\n  return {id:\"lk-\"+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36),patientId:pid,semana:semana,\n    token:token,status:status||\"gerado\",criadoEm:created.toISOString(),expiraEm:exp.toISOString()};\n}\nfunction linksFor(pid){ return S.links.filter(function(l){return l.patientId===pid;}).sort(function(a,b){return new Date(b.criadoEm)-new Date(a.criadoEm);}); }\nfunction allLinksSorted(){ return S.links.slice().sort(function(a,b){return new Date(b.criadoEm)-new Date(a.criadoEm);}); }\nfunction activeLink(pid){ return linksFor(pid).filter(function(l){return l.status===\"gerado\"||l.status===\"enviado\";})[0]||null; }\nfunction expireLinks(){ var now=Date.now(),ch=false; S.links=S.links.map(function(l){ if((l.status===\"gerado\"||l.status===\"enviado\")&&new Date(l.expiraEm).getTime()<now){ ch=true; return Object.assign({},l,{status:\"expirado\"}); } return l; }); if(ch) persist(); }\nfunction seedLinks(P){\n  var out=[];\n  P.forEach(function(p){\n    var wk=Math.max(1,Math.floor((Date.now()-new Date(p.inicio).getTime())/6048e5)+1);\n    var answered=(p._lastStatus===\"respondido\"||p._lastStatus===\"analisado\");\n    out.push(makeLink(p.id,wk,answered?\"respondido\":\"enviado\"));\n  });\n  if(P[0]){ out.push(makeLink(P[0].id, weekNum(P[0])+1, \"gerado\")); }\n  if(P[3]){ out.push(makeLink(P[3].id, Math.max(1,weekNum(P[3])-1), \"expirado\", Date.now()-14*864e5)); }\n  return out;\n}\nfunction shortToken(t){ return t.length>24?t.slice(0,24)+\"…\":t; }\nfunction linkStatusTag(st){\n  var m={gerado:[\"grey\",\"Gerado\"],enviado:[\"amber\",\"Enviado\"],respondido:[\"green\",\"Respondido\"],expirado:[\"red\",\"Expirado\"]}[st]||[\"grey\",st];\n  return '<span class=\"tag '+m[0]+'\">'+m[1]+'<\u002Fspan>';\n}\nfunction linkStepper(status){\n  if(status===\"expirado\"){\n    return '<div style=\"display:flex;align-items:center;gap:9px;background:#F7E6E2;border:1px solid #ecc9c1;border-radius:12px;padding:12px 14px;margin:18px 0\"><span style=\"width:11px;height:11px;border-radius:99px;background:#BC5443;flex:none\"><\u002Fspan><span style=\"font-weight:600;color:#BC5443;font-size:13px\">Expirado — passou de 7 dias sem resposta. Gere um novo link.<\u002Fspan><\u002Fdiv>';\n  }\n  var steps=[[\"gerado\",\"Gerado\"],[\"enviado\",\"Enviado\"],[\"respondido\",\"Respondido\"]];\n  var order={gerado:0,enviado:1,respondido:2}, cur=order[status];\n  var cols={gerado:\"#8A7B65\",enviado:\"#E0A32E\",respondido:\"#A9723F\"};\n  var html='<div style=\"display:flex;align-items:center;margin:18px 0 4px\">';\n  steps.forEach(function(s,i){\n    var done=i<=cur, c=done?cols[s[0]]:\"#EAE0CE\";\n    html+='<div style=\"display:flex;flex-direction:column;align-items:center;flex:0 0 auto;width:78px\"><span style=\"width:16px;height:16px;border-radius:99px;background:'+c+';'+(i===cur?\"box-shadow:0 0 0 4px \"+c+\"33\":\"\")+'\"><\u002Fspan><span class=\"mono\" style=\"font-size:10px;margin-top:7px;color:'+(done?\"#4A3220\":\"#AC9C83\")+'\">'+s[1]+'<\u002Fspan><\u002Fdiv>';\n    if(i<steps.length-1){ html+='<div style=\"flex:1;height:2px;background:'+(i<cur?cols[steps[i+1][0]]:\"#EAE0CE\")+';margin-bottom:19px\"><\u002Fdiv>'; }\n  });\n  return html+'<\u002Fdiv>';\n}\nfunction linksPanelBody(pid){\n  var ls=linksFor(pid);\n  if(!ls.length) return '<div class=\"emptynote\">Nenhum link gerado para este paciente ainda.<\u002Fdiv>';\n  return ls.slice(0,5).map(function(l){\n    return '<div class=\"row\"><div><div class=\"nm mono\" style=\"font-size:12px\">'+esc(shortToken(l.token))+'<\u002Fdiv><div class=\"meta\">semana '+l.semana+' · gerado '+fmtDay(new Date(l.criadoEm))+' · expira '+fmtDay(new Date(l.expiraEm))+'<\u002Fdiv><\u002Fdiv>'+\n      '<div class=\"right\" style=\"display:flex;align-items:center;gap:8px\">'+linkStatusTag(l.status)+'<button class=\"btn ghost small\" data-action=\"dlCheckinHTML\" data-id=\"'+l.patientId+'\">baixar HTML<\u002Fbutton><button class=\"btn ghost small\" data-action=\"openLink\" data-id=\"'+l.id+'\">ver<\u002Fbutton><button class=\"btn ghost small\" data-action=\"delLink\" data-id=\"'+l.id+'\" style=\"color:#BC5443;border-color:#ecc9c1\">apagar<\u002Fbutton><\u002Fdiv><\u002Fdiv>';\n  }).join(\"\");\n}\nfunction linksTableRows(){\n  var ls=allLinksSorted();\n  if(!ls.length) return '<tr><td colspan=\"6\"><div class=\"emptynote\">Nenhum link gerado ainda. Use o botão acima para gerar o primeiro.<\u002Fdiv><\u002Ftd><\u002Ftr>';\n  return ls.map(function(l){ var p=pOf(l.patientId);\n    return '<tr>'+\n      '<td><div style=\"display:flex;align-items:center;gap:10px\"><span class=\"avatar\" style=\"width:30px;height:30px;font-size:11px;background:'+(p?p.color:\"#999\")+'\">'+initials(p?p.name:\"?\")+'<\u002Fspan><div><div style=\"font-weight:600;color:#4A3220\">'+esc(p?p.name:\"—\")+'<\u002Fdiv><div class=\"meta mono\" style=\"font-size:11px\">semana '+l.semana+'<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Ftd>'+\n      '<td class=\"mono\" style=\"font-size:11.5px;color:#8A7B65\">'+esc(shortToken(l.token))+'<\u002Ftd>'+\n      '<td>'+linkStatusTag(l.status)+'<\u002Ftd>'+\n      '<td class=\"mono\" style=\"font-size:12px;color:#8A7B65\">'+fmtDay(new Date(l.criadoEm))+'<\u002Ftd>'+\n      '<td class=\"mono\" style=\"font-size:12px;color:#8A7B65\">'+fmtDay(new Date(l.expiraEm))+'<\u002Ftd>'+\n      '<td><div style=\"display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap\">'+\n        (l.status===\"gerado\"?'<button class=\"btn ghost small\" data-action=\"markSent\" data-id=\"'+l.id+'\">Marcar enviado<\u002Fbutton>':\"\")+\n        '<button class=\"btn ghost small\" data-action=\"copyLink\" data-id=\"'+l.id+'\">Copiar<\u002Fbutton>'+\n        '<button class=\"btn ghost small\" data-action=\"dlCheckinHTML\" data-id=\"'+l.patientId+'\" style=\"color:#84532B;border-color:#DEC9A6\">Baixar HTML<\u002Fbutton>'+\n        '<button class=\"btn ghost small\" data-action=\"openLink\" data-id=\"'+l.id+'\">Ver<\u002Fbutton>'+\n        '<button class=\"btn ghost small\" data-action=\"genLink\" data-id=\"'+l.patientId+'\">Novo<\u002Fbutton>'+\n        '<button class=\"btn ghost small\" data-action=\"delLink\" data-id=\"'+l.id+'\" style=\"color:#BC5443;border-color:#ecc9c1\">Apagar<\u002Fbutton>'+\n      '<\u002Fdiv><\u002Ftd><\u002Ftr>';\n  }).join(\"\");\n}\nfunction viewLinks(){\n  var counts={gerado:0,enviado:0,respondido:0,expirado:0}; S.links.forEach(function(l){counts[l.status]=(counts[l.status]||0)+1;});\n  var opts=S.patients.map(function(p){return '<option value=\"'+p.id+'\">'+esc(p.name)+' · semana '+weekNum(p)+'<\u002Foption>';}).join(\"\");\n  var legend='<div class=\"legendrow\" style=\"margin-top:16px\">'+['gerado','enviado','respondido','expirado'].map(function(k){return '<span>'+linkStatusTag(k)+'<\u002Fspan>';}).join(\"\")+'<\u002Fdiv>';\n  var gen='<div class=\"panel\"><div class=\"panel-h\"><h3>'+IC.link+' Gerar novo link<\u002Fh3><\u002Fdiv><div class=\"panel-b\" style=\"padding-top:14px\">'+\n    '<p style=\"font-size:14px;color:#8A7B65;margin-bottom:14px;max-width:64ch\">Escolha o paciente e gere o link único e individual do check-in desta semana. Cada link é tokenizado, expira em 7 dias e só pode ser respondido uma vez.<\u002Fp>'+\n    '<div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap\"><select id=\"lk-pat\" style=\"width:auto;min-width:240px\">'+opts+'<\u002Fselect><button class=\"btn primary\" data-action=\"genLinkSel\">'+IC.link+' Gerar link da semana<\u002Fbutton><\u002Fdiv>'+legend+'<\u002Fdiv><\u002Fdiv>';\n  var table='<div class=\"panel\" style=\"margin-top:16px\"><div class=\"panel-h\"><h3>Links gerados<\u002Fh3><div style=\"display:flex;gap:10px;align-items:center\"><span class=\"mono\" style=\"font-size:11px;color:#8A7B65\">'+S.links.length+' no total<\u002Fspan><button class=\"btn primary small\" data-action=\"openImport\">Importar resposta<\u002Fbutton><button class=\"btn ghost small\" data-action=\"clearExpired\">Limpar expirados<\u002Fbutton><\u002Fdiv><\u002Fdiv><div class=\"tbl-wrap\"><table class=\"tbl\"><thead><tr><th>Paciente<\u002Fth><th>Token<\u002Fth><th>Status<\u002Fth><th>Gerado<\u002Fth><th>Expira<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody>'+linksTableRows()+'<\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>';\n  return '<div class=\"page\">'+\n    '<div class=\"page-head\"><span class=\"eyebrow\">Geração de check-in<\u002Fspan><h1>Links de check-in<\u002Fh1><p class=\"sub\">Gere, acompanhe e distribua os links individuais de cada paciente. Do envio à resposta, tudo em um só lugar.<\u002Fp><\u002Fdiv>'+\n    '<div class=\"grid-kpi\">'+\n      kpi(\"view\",\"links\",IC.plus,\"Gerados\",counts.gerado,\"\",\"aguardando envio\")+\n      kpi(\"view\",\"links\",IC.clock,\"Enviados\",counts.enviado,\"warn\",\"aguardando resposta\")+\n      kpi(\"view\",\"links\",IC.board,\"Respondidos\",counts.respondido,\"\",\"já no dashboard\")+\n      kpi(\"view\",\"links\",IC.alert,\"Expirados\",counts.expirado,\"alert\",\"precisam de novo link\")+\n    '<\u002Fdiv>'+gen+table+'<\u002Fdiv>';\n}\nfunction linkFileURL(l){ return \"checkin.html#t=\"+encodeURIComponent(l.token); }\nfunction linkFileAbs(l){ try{ return new URL(linkFileURL(l), window.location.href).href; }catch(e){ return linkFileURL(l); } }\nfunction modalLinkGen(){\n  var l=S.links.find(function(x){return x.id===S.linkId;}); if(!l) return \"\";\n  var p=pOf(l.patientId); var url=linkURL(l); var fileRel=linkFileURL(l); var fileAbs=linkFileAbs(l);\n  var actions=(l.status===\"gerado\")?'<button class=\"btn ghost\" data-action=\"markSent\" data-id=\"'+l.id+'\">Marcar como enviado<\u002Fbutton>':\"\";\n  var canOpen=(l.status!==\"expirado\");\n  return '<div class=\"modal-bg\" data-action=\"closeModalBg\"><div class=\"modal\"><div cla },l,{status:\"respondido\"}):l;}); }\n  persist(); S.modal=null; S.selId=pid; S.view=\"ficha\"; S.tab=\"visao\"; S.openHist=null; render();\n  toast(p.name.split(\" \")[0]+\": resposta importada e lançada na ficha.\");\n}\nfunction modalImport(){\n  return '<div class=\"modal-bg\" data-action=\"closeModalBg\"><div class=\"modal\"><div class=\"modal-h\"><h3>Importar resposta do paciente<\u002Fh3><button class=\"x\" data-action=\"closeModal\">×<\u002Fbutton><\u002Fdiv>'+\n    '<div class=\"modal-b\"><p style=\"font-size:14px;color:#8A7B65;margin-bottom:12px;line-height:1.6\">Quando o paciente finaliza o check-in no arquivo, aparece um <b style=\"color:#4A3220\">código<\u002Fb> para ele te enviar. Cole aqui embaixo: o sistema lança as respostas na ficha e atualiza os gráficos automaticamente.<\u002Fp>'+\n    '<textarea id=\"imp-code\" rows=\"5\" placeholder=\"Cole aqui o código que começa com RAIZ-…\" style=\"font-family:Space Mono,monospace;font-size:12px\"><\u002Ftextarea><\u002Fdiv>'+\n    '<div class=\"modal-f\"><button class=\"btn ghost\" data-action=\"closeModal\">Cancelar<\u002Fbutton><button class=\"btn primary\" data-action=\"doImport\">Importar resposta<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n}\nfunction routeFromHash(){\n  var m=(location.hash||\"\").match(/chk=([^&]+)/); if(!m) return;\n  var token=decodeURIComponent(m[1]);\n  var l=S.links.filter(function(x){return x.token===token;})[0]; if(!l) return;\n  S.role=\"paciente\"; S.selId=l.patientId;\n  if(l.status===\"expirado\"){ S.pmode=\"home\"; return; }\n  var p=pOf(l.patientId); if(!p) return; var ob=p.onboarding, sc={}; INDICATORS.forEach(function(x){sc[x.key]=7;});\n  S.draft={scores:sc,peso:ob.pesoInicial,treinos:ob.treinoPlanejado,texto:\"\",fSono:\"\",fAdesao:\"\",fTreino:\"\",alertOn:false,alertTxt:\"\"};\n  S.pmode=\"checkin\"; S._viaLink=l.id;\n}\n\n/* ---------- SVG charts ---------- */\nfunction niceTicks(min,max){\n  var lo=Math.floor(min-1), hi=Math.ceil(max+1); if(hi-lo<4) hi=lo+4;\n  var step=(hi-lo)/4, t=[]; for(var i=0;i<=4;i++) t.push(+(lo+step*i).toFixed(1)); return {ticks:t,lo:lo,hi:hi};\n}\nfunction lineChartSVG(data,series,opts){\n  opts=opts||{}; var W=720,H=300,pl=40,pr=16,pt=14,pb=34;\n  var iw=W-pl-pr, ih=H-pt-pb, n=data.length;\n  var yMin,yMax,ticks;\n  if(opts.auto){ var vals=[]; data.forEach(function(r){ series.forEach(function(s){ if(r[s.key]!=null) vals.push(r[s.key]); }); }); var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals); var nt=niceTicks(mn,mx); yMin=nt.lo; yMax=nt.hi; ticks=nt.ticks; }\n  else { yMin=0; yMax=10; ticks=[0,2,4,6,8,10]; }\n  var xFor=function(i){ return n<=1?pl+iw/2:pl+iw*i/(n-1); };\n  var yFor=function(v){ return pt+ih*(1-(v-yMin)/((yMax-yMin)||1)); };\n  var g=\"\";\n  ticks.forEach(function(tk){ var y=yFor(tk); g+='<line x1=\"'+pl+'\" y1=\"'+y+'\" x2=\"'+(W-pr)+'\" y2=\"'+y+'\" stroke=\"#EAE0CE\" stroke-width=\"1\"/>'; g+='<text x=\"'+(pl-8)+'\" y=\"'+(y+4)+'\" text-anchor=\"end\" font-size=\"11\" fill=\"#8A7B65\" font-family=\"Space Mono,monospace\">'+tk+'<\u002Ftext>'; });\n  data.forEach(function(r,i){ if(n<=8||i%Math.ceil(n/8)===0){ g+='<text x=\"'+xFor(i)+'\" y=\"'+(H-12)+'\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8A7B65\" font-family=\"Space Mono,monospace\">'+r.label+'<\u002Ftext>'; } });\n  var lines=\"\";\n  series.forEach(function(s){\n    var pts=data.map(function(r,i){ return r[s.key]==null?null:{x:xFor(i),y:yFor(r[s.key]),v:r[s.key],lab:r.label}; }).filter(Boolean);\n    if(pts.length===0) return;\n    var d=pts.map(function(p,i){ return (i?\"L\":\"M\")+p.x.toFixed(1)+\" \"+p.y.toFixed(1); }).join(\" \");\n    lines+='<path d=\"'+d+'\" fill=\"none\" stroke=\"'+s.color+'\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>';\n    pts.forEach(function(p){ lines+='<circle cx=\"'+p.x.toFixed(1)+'\" cy=\"'+p.y.toFixed(1)+'\" r=\"3.2\" fill=\"#fff\" stroke=\"'+s.color+'\" stroke-width=\"2\"><title>'+esc(s.name)+' · '+p.lab+': '+p.v+(opts.unit||\" ar vencendo=S.patients.filter(function(p){var dd=(new Date(p.vencimento)-now)/86400000; return dd>=0&&dd<=7;});\n  var regrediram=S.patients.map(function(p){return {p:p,t:trendGeral(p.id)};}).filter(function(x){return x.t<=-2;});\n  var weeks=lastSundays(6);\n  var eng=weeks.map(function(w){ var key=fmtDay(w);\n    var sent=S.checkins.filter(function(c){return fmtDay(new Date(c.date))===key;}).length;\n    var ans=S.checkins.filter(function(c){return fmtDay(new Date(c.date))===key&&c.answered;}).length;\n    return {label:key,Enviados:sent,Respondidos:ans};\n  });\n\n  var alertHtml=alertas.length? alertas.map(function(a){ var p=pOf(a.patientId); return '<div class=\"alertcard\" data-action=\"open\" data-id=\"'+a.patientId+'\"><div class=\"who\">'+esc(p?p.name:\"\")+' · '+esc(p?p.objetivo:\"\")+'<\u002Fdiv><div class=\"txt\">'+esc(a.alerta.texto)+'<\u002Fdiv><\u002Fdiv>'; }).join(\"\") : '<div class=\"emptynote\">Nenhum alerta esta semana. Tudo tranquilo.<\u002Fdiv>';\n\n  var regHtml=regrediram.length? regrediram.map(function(x){ return '<div class=\"row\"><div class=\"avatar\" style=\"background:'+x.p.color+'\">'+initials(x.p.name)+'<\u002Fdiv><div><div class=\"nm\">'+esc(x.p.name)+'<\u002Fdiv><div class=\"meta\">'+esc(x.p.objetivo)+'<\u002Fdiv><\u002Fdiv><div class=\"right\"><span class=\"trend down\">▼ '+x.t+'<\u002Fspan><div class=\"meta\">vs semana anterior<\u002Fdiv><\u002Fdiv><\u002Fdiv>'; }).join(\"\") : '<div class=\"emptynote\">Ninguém em queda relevante. Bom sinal.<\u002Fdiv>';\n\n  var pendHtml=naoResp.length? naoResp.map(function(c){ var p=pOf(c.patientId); return '<div class=\"row\" data-action=\"open\" data-id=\"'+c.patientId+'\" style=\"cursor:pointer\"><div class=\"avatar\" style=\"background:'+(p?p.color:\"#999\")+'\">'+initials(p?p.name:\"?\")+'<\u002Fdiv><div><div class=\"nm\">'+esc(p?p.name:\"\")+'<\u002Fdiv><div class=\"meta\">enviado '+fmtDay(new Date(c.date))+'<\u002Fdiv><\u002Fdiv><div class=\"right\"><span class=\"tag amber\">'+IC.clock+' aguardando<\u002Fspan><\u002Fdiv><\u002Fdiv>'; }).join(\"\") : '<div class=\"emptynote\">Todos responderam. 100% de engajamento.<\u002Fdiv>';\n\n  var legend='<div class=\"legendrow\"><span><i style=\"width:11px;height:11px;border-radius:3px;background:#DEC9A6;display:inline-block\"><\u002Fi> Enviados<\u002Fspan><span><i style=\"width:11px;height:11px;border-radius:3px;background:#A9723F;display:inline-block\"><\u002Fi> Respondidos<\u002Fspan><\u002Fdiv>';\n\n  return '<div class=\"page\">'+\n    '<div class=\"page-head\"><span class=\"eyebrow\">Domingo · sua semana<\u002Fspan><h1>Triagem da semana<\u002Fh1><p class=\"sub\">O que precisa da sua atenção agora, do mais urgente ao acompanhamento de rotina.<\u002Fp><\u002Fdiv>'+\n    '<div class=\"grid-kpi\">'+\n      kpi(\"view\",\"pacientes\",IC.users,\"Pacientes ativos\",ativos,\"\",\"carteira em acompanhamento\")+\n      kpi(\"view\",\"esteira\",IC.clock,\"Check-ins a analisar\",pendentes.length,\"warn\",\"respondidos, aguardando você\")+\n      kpi(\"view\",\"esteira\",IC.alert,\"Alertas clínicos\",alertas.length,\"alert\",\"pacientes que sinalizaram algo\")+\n      kpi(\"view\",\"pacientes\",IC.bell,\"Vencendo em 7 dias\",vencendo.length,\"\",\"planos a renovar\")+\n    '<\u002Fdiv>'+\n    '<div class=\"cols\">'+\n      '<div class=\"stack\">'+\n        panel(IC.alert+\" Alertas clínicos no topo\",\"\",alertHtml)+\n        panel(\"Quem regrediu\",'<span class=\"mono\" style=\"font-size:11px;color:#8A7B65\">queda na nota geral<\u002Fspan>',regHtml)+\n      '<\u002Fdiv>'+\n      '<div class=\"stack\">'+\n        panel(\"A responder\",'<button class=\"linkbtn\" data-action=\"view\" data-id=\"esteira\">ver esteira<\u002Fbutton>',pendHtml)+\n        panel(\"Engajamento com check-ins\",'<span class=\"mono\" style=\"font-size:11px;color:#8A7B65\">6 semanas<\u002Fspan>', barChartSVG(eng,[{key:\"Enviados\",name:\"Enviados\",color:\"#DEC9A6\"},{key:\"Respondidos\",name:\"Respondidos\",color:\"#A9723F\"}])+legend)+\n      '< ion(a,b){\n    if(s===\"resposta\"){ var la=latest(a.id),lb=latest(b.id); return (lb?new Date(lb.date).getTime():0)-(la?new Date(la.date).getTime():0); }\n    if(s===\"nota\"){ var na=(latest(a.id)||{scores:{}}).scores.geral||0, nb=(latest(b.id)||{scores:{}}).scores.geral||0; return nb-na; }\n    if(s===\"tendencia\"){ return trendGeral(b.id)-trendGeral(a.id); }\n    return a.name.localeCompare(b.name,\"pt\");\n  });\n  return arr;\n}\nfunction patientRow(p){\n  var l=latest(p.id), t=trendGeral(p.id);\n  var tcls=t>0?\"up\":(t<0?\"down\":\"flat\"); var tsym=t>0?\"▲ +\"+t:(t<0?\"▼ \"+t:\"—\"); var st=p.status||\"ativo\";\n  return '<tr>'+\n    '<td data-action=\"open\" data-id=\"'+p.id+'\" style=\"cursor:pointer\"><div style=\"display:flex;align-items:center;gap:11px\"><span class=\"avatar\" style=\"background:'+p.color+'\">'+initials(p.name)+'<\u002Fspan><div><div style=\"font-weight:600;color:#4A3220\">'+esc(p.name)+'<\u002Fdiv><div class=\"meta mono\" style=\"font-size:11px\">'+esc(p.onboarding.restricoes)+'<\u002Fdiv>'+tagChips(p.tags)+'<\u002Fdiv><\u002Fdiv><\u002Ftd>'+\n    '<td data-action=\"open\" data-id=\"'+p.id+'\" style=\"cursor:pointer\">'+esc(p.objetivo)+'<div class=\"meta\" style=\"font-size:11px\">'+esc(p.plano)+'<\u002Fdiv><\u002Ftd>'+\n    '<td>'+patStatusTag(st)+'<\u002Ftd>'+\n    '<td>'+(l?fmtDay(new Date(l.date)):\"—\")+'<\u002Ftd>'+\n    '<td><b style=\"font-family:Space Mono,monospace;color:#4A3220\">'+(l?l.scores.geral:\"—\")+'<\u002Fb> <span class=\"trend '+tcls+'\" style=\"font-size:11px\">'+tsym+'<\u002Fspan><\u002Ftd>'+\n    '<td style=\"text-align:right\"><div style=\"display:inline-flex;gap:6px;flex-wrap:wrap;justify-content:flex-end\">'+\n      '<button class=\"btn ghost small\" data-action=\"editPatient\" data-id=\"'+p.id+'\">Editar<\u002Fbutton>'+\n      (st===\"arquivado\"?'<button class=\"btn ghost small\" data-action=\"restorePatient\" data-id=\"'+p.id+'\">Reativar<\u002Fbutton>':'<button class=\"btn ghost small\" data-action=\"archivePatient\" data-id=\"'+p.id+'\">Arquivar<\u002Fbutton>')+\n      '<button class=\"btn ghost small\" data-action=\"delPatient\" data-id=\"'+p.id+'\" style=\"color:#BC5443;border-color:#ecc9c1\">Excluir<\u002Fbutton>'+\n    '<\u002Fdiv><\u002Ftd><\u002Ftr>';\n}\nfunction patientRowsHTML(){\n  var list=filteredPatients();\n  return list.length? list.map(patientRow).join(\"\") : '<tr><td colspan=\"6\"><div class=\"emptynote\">Nenhum paciente encontrado com esses filtros.<\u002Fdiv><\u002Ftd><\u002Ftr>';\n}\nfunction viewPatients(){\n  var f=S.patFilter;\n  var counts={todos:S.patients.length,ativos:0,pausados:0,arquivados:0};\n  S.patients.forEach(function(p){var s=p.status||\"ativo\";if(s===\"ativo\")counts.ativos++;else if(s===\"pausado\")counts.pausados++;else if(s===\"arquivado\")counts.arquivados++;});\n  var statusChips=[[\"ativos\",\"Ativos\"],[\"pausados\",\"Pausados\"],[\"arquivados\",\"Arquivados\"],[\"todos\",\"Todos\"]].map(function(o){\n    return '<button class=\"fchip'+(f.status===o[0]?\" on\":\"\")+'\" data-action=\"patStatus\" data-id=\"'+o[0]+'\">'+o[1]+' <span class=\"fc\">'+counts[o[0]]+'<\u002Fspan><\u002Fbutton>';\n  }).join(\"\");\n  var objs=[\"todos\",\"Emagrecimento\",\"Hipertrofia\",\"Recomposição corporal\",\"Reeducação alimentar\",\"Saúde e performance\"];\n  var objSel='<select class=\"minisel\" data-action=\"patObj\">'+objs.map(function(o){return '<option value=\"'+o+'\"'+(f.obj===o?\" selected\":\"\")+'>'+(o===\"todos\"?\"Todos os objetivos\":o)+'<\u002Foption>';}).join(\"\")+'<\u002Fselect>';\n  var sorts=[[\"nome\",\"Ordenar: Nome\"],[\"resposta\",\"Ordenar: Última resposta\"],[\"nota\",\"Ordenar: Nota geral\"],[\"tendencia\",\"Ordenar: Tendência\"]];\n  var sortSel='<select class=\"minisel\" data-action=\"patSort\">'+sorts.map(function(o){return '<option value=\"'+o[0]+'\"'+(f.sort===o[0]?\" selected\":\"\")+'>'+o[1]+'<\u002Foption>';}).join(\"\")+'<\u002Fselect>';\n  var list=filteredPatients();\n  return '<div class=\"page\">'+\n etivo)+'<\u002Fspan><span>· '+esc(p.plano)+'<\u002Fspan><span>· vence '+fmtFull(new Date(p.vencimento))+'<\u002Fspan><\u002Fdiv>'+tagChips(p.tags)+'<\u002Fdiv>'+\n      '<div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:8px;margin-left:auto\">'+\n        '<div style=\"display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end\">'+\n          '<button class=\"btn ghost\" data-action=\"editPatient\" data-id=\"'+p.id+'\">Editar<\u002Fbutton>'+\n          ((p.status||\"ativo\")===\"arquivado\"?'<button class=\"btn ghost\" data-action=\"restorePatient\" data-id=\"'+p.id+'\">Reativar<\u002Fbutton>':'<button class=\"btn ghost\" data-action=\"archivePatient\" data-id=\"'+p.id+'\">Arquivar<\u002Fbutton>')+\n          '<button class=\"btn primary\" data-action=\"genLink\" data-id=\"'+p.id+'\">'+IC.link+' Gerar check-in<\u002Fbutton>'+\n        '<\u002Fdiv>'+\n        (function(){var al=activeLink(p.id);return al?'<span style=\"font-size:12px;color:#8A7B65\">link atual: '+linkStatusTag(al.status)+'<\u002Fspan>':'';})()+\n      '<\u002Fdiv>'+\n    '<\u002Fdiv>'+\n    '<div class=\"tabs\">'+tabs.map(function(t){return '<button class=\"'+(S.tab===t[0]?\"on\":\"\")+'\" data-action=\"tab\" data-id=\"'+t[0]+'\">'+t[1]+'<\u002Fbutton>';}).join(\"\")+'<\u002Fdiv>'+\n    body+'<\u002Fdiv>';\n}\nfunction scoreBars(sc){\n  return INDICATORS.map(function(ind){ var v=sc[ind.key]||0; var col=v>=7?ind.color:(v>=5?\"#E0A32E\":\"#BC5443\");\n    return '<div class=\"sbar\"><div class=\"sl\">'+ind.label+'<\u002Fdiv><div class=\"track\"><div class=\"fill\" style=\"width:'+(v*10)+'%;background:'+col+'\"><\u002Fdiv><\u002Fdiv><div class=\"sv\" style=\"color:'+col+'\">'+v+'<\u002Fdiv><\u002Fdiv>';\n  }).join(\"\");\n}\nfunction profOverview(p){\n  var l=latest(p.id), ob=p.onboarding;\n  var left=l? scoreBars(l.scores)+(l.texto?'<div class=\"qbox\">“'+esc(l.texto)+'”<\u002Fdiv>':\"\") : '<div class=\"emptynote\">Ainda sem check-in respondido.<\u002Fdiv>';\n  var info=[[\"Peso inicial\",ob.pesoInicial+\" kg\"],[\"Altura\",ob.altura+\" m\"],[\"Peso atual\",(l&&l.metrics&&l.metrics.peso!=null)?l.metrics.peso+\" kg\":\"—\"],[\"Sono habitual\",ob.sonoHabitual],[\"Treino planejado\",ob.treinoPlanejado+\"x / semana\"],[\"Meta de água\",ob.metaAgua+\" L / dia\"],[\"Restrições\",ob.restricoes]];\n  var infoHtml=info.map(function(k){ return '<div class=\"row\" style=\"padding:10px 0\"><div class=\"mono\" style=\"font-size:11px;color:#8A7B65;text-transform:uppercase;letter-spacing:.06em;width:150px\">'+k[0]+'<\u002Fdiv><div style=\"font-size:14px;font-weight:500;color:#2A2117\">'+esc(k[1])+'<\u002Fdiv><\u002Fdiv>'; }).join(\"\");\n  var linkPanel=panel(IC.link+\" Links de check-in\",'<button class=\"btn primary small\" data-action=\"genLink\" data-id=\"'+p.id+'\">Gerar novo<\u002Fbutton>',linksPanelBody(p.id));\n  var notesPanel=panel(\"Anotações particulares\",'<span class=\"mono\" style=\"font-size:11px;color:#8A7B65\">só você vê<\u002Fspan>','<textarea rows=\"3\" data-action=\"patNotes\" data-id=\"'+p.id+'\" placeholder=\"Histórico clínico, preferências, pontos de atenção…\" style=\"width:100%\">'+esc(p.notes||\"\")+'<\u002Ftextarea>');\n  return '<div class=\"stack\"><div class=\"cols\">'+panel(\"Último check-in \"+(l?\"· \"+fmtFull(new Date(l.date)):\"\"),\"\",left)+panel(\"Dados do paciente\",'<button class=\"btn ghost small\" data-action=\"editPatient\" data-id=\"'+p.id+'\">Editar<\u002Fbutton>',infoHtml)+'<\u002Fdiv>'+linkPanel+notesPanel+'<\u002Fdiv>';\n}\nfunction profCheckins(p){\n  var hist=answeredFor(p.id).slice().reverse();\n  if(hist.length===0) return '<div class=\"emptynote\">Sem check-ins respondidos ainda.<\u002Fdiv>';\n  if(S.openHist==null) S.openHist=hist[0].id;\n  var items=hist.map(function(c){\n    var g=c.scores.geral||0; var gcol=g>=7?\"#A9723F\":(g>=5?\"#E0A32E\":\"#BC5443\"); var open=S.openHist===c.id;\n    var head='<div class=\"hitem-h\" data-action=\"toggleHist\" data-id=\"'+c.id+'\"><span class=\"scoredot\" style=\"background:'+gcol+'\">geral '+g+'<\u002Fspan><div class=\"d\">'+fmtFull(new Date(c.date))+'<\u002Fdiv>'+\n      (c.alerta&&c.alerta.flag?'<span class=\"tag red\">'+IC.alert+' alerta<\u002Fspan>':\"\")+\n      (c.triageStatus===\"respondido\"?'<span class=\"tag amber\" style=\"margin-left:auto\">a analisar<\u002Fspan>':\"\")+\n      (c.triageStatus===\"analisado\"?'<span class=\"tag green\" style=\"margin-left:auto\">analisado<\u002Fspan>':\"\")+'<\u002Fdiv>';\n    var body=\"\";\n    if(open){\n      var fu=\"\";\n      var fk=Object.keys(c.followups||{});\n      if(fk.length){ fu='<div class=\"qbox\" style=\"background:#FBF1DC\"><b style=\"color:#7a5c0e\">Detalhes condicionais:<\u002Fb>'+\n        (c.followups.sono?'<div style=\"margin-top:6px\">Sono: '+esc(c.followups.sono)+'<\u002Fdiv>':\"\")+\n        (c.followups.adesao?'<div style=\"margin-top:6px\">Adesão: '+esc(c.followups.adesao)+'<\u002Fdiv>':\"\")+\n        (c.followups.treino?'<div style=\"margin-top:6px\">Treino: '+esc(c.followups.treino)+'<\u002Fdiv>':\"\")+'<\u002Fdiv>'; }\n      body='<div class=\"hitem-body\">'+\n        (c.alerta&&c.alerta.flag?'<div class=\"alertcard\" style=\"margin-top:12px;cursor:default\"><div class=\"who\">'+IC.alert+' Alerta clínico<\u002Fdiv><div class=\"txt\">'+esc(c.alerta.texto)+'<\u002Fdiv><\u002Fdiv>':\"\")+\n        '<div style=\"margin-top:12px\">'+scoreBars(c.scores)+'<\u002Fdiv>'+\n        '<div class=\"qbox\" style=\"margin-top:14px\"><b style=\"color:#4A3220\">Peso:<\u002Fb> '+(c.metrics?c.metrics.peso:\"—\")+' kg &nbsp;·&nbsp; <b style=\"color:#4A3220\">Treinos:<\u002Fb> '+(c.metrics?c.metrics.treinosFeitos:\"—\")+'/'+(c.metrics?c.metrics.treinoPlanejado:\"—\")+(c.texto?'<div style=\"margin-top:8px\">“'+esc(c.texto)+'”<\u002Fdiv>':\"\")+'<\u002Fdiv>'+\n        fu+\n        '<div class=\"commentbox\"><label style=\"font-size:13px;font-weight:600;color:#2A2117;display:block;margin-bottom:6px\">Seu comentário para o paciente<\u002Flabel>'+\n        '<textarea rows=\"2\" data-action=\"comment\" data-id=\"'+c.id+'\" placeholder=\"Ex: parabéns pela constância, vamos ajustar o jantar…\">'+esc(c.nutriComment)+'<\u002Ftextarea>'+\n        (c.triageStatus!==\"analisado\"?'<button class=\"btn primary small\" style=\"margin-top:10px\" data-action=\"markAnalisado\" data-id=\"'+c.id+'\">Marcar como analisado<\u002Fbutton>':\"\")+'<button class=\"btn ghost small\" data-action=\"delCheckin\" data-id=\"'+c.id+'\" style=\"margin-top:10px;margin-left:8px;color:#BC5443;border-color:#ecc9c1\">Apagar check-in<\u002Fbutton><\u002Fdiv>';\n    }\n    return '<div class=\"hitem\">'+head+body+'<\u002Fdiv>';\n  }).join(\"\");\n  return '<div style=\"max-width:760px\">'+items+'<\u002Fdiv>';\n}\nfunction profEvolution(p){\n  var hist=answeredFor(p.id);\n  if(hist.length===0) return '<div class=\"emptynote\">Sem histórico para gráficos ainda.<\u002Fdiv>';\n  var data=hist.map(function(c){ var row={label:fmtDay(new Date(c.date))}; INDICATORS.forEach(function(i){row[i.key]=c.scores[i.key];}); return row; });\n  var pesoData=hist.map(function(c){ return {label:fmtDay(new Date(c.date)),peso:c.metrics?c.metrics.peso:null}; });\n  var series=S.evoSel.map(function(k){ return {key:k,name:IND_MAP[k].label,color:IND_MAP[k].color}; });\n  var presets=[[\"Sono × Humor\",\"sono,humor\"],[\"Adesão × Controle\",\"adesao,controle\"],[\"Digestão × Tranquilidade\",\"digestao,tranquilidade\"],[\"Só a nota geral\",\"geral\"]];\n  var presetHtml=presets.map(function(pr){ return '<button class=\"btn ghost small\" data-action=\"preset\" data-id=\"'+pr[1]+'\">'+pr[0]+'<\u002Fbutton>'; }).join(\"\");\n  var chips=INDICATORS.map(function(ind){ var on=S.evoSel.indexOf(ind.key)>=0;\n    return '<button class=\"chip'+(on?\" on\":\"\")+'\" data-action=\"chip\" data-id=\"'+ind.key+'\" style=\"'+(on?\"background:\"+ind.color+\";color:#fff;border-color:transparent\":\"\")+'\"><span style=\"width:8px;height:8px;border-radius:50%;background:'+(on?\"#fff\":ind.color)+';display:inline-block\"><\u002Fspan>'+ind.label+'<\u002Fbutton>'; }).join(\"\");\n  var legend='<div class=\"legendrow\">'+series.map(function(s){return '<span><i style=\"width:11px;height:3px;background:'+s.color+';display:inline-block\"><\u002Fi> '+s.name+'<\u002Fspan>';}).join(\"\")+'<\u002Fdiv>';\n  var evoBody='<div class=\"presetrow\">'+presetHtml+'<\u002Fdiv><div class=\"chips\">'+chips+'<\u002Fdiv>'+lineChartSVG(data,series,{})+legend+'<div class=\"chart-note\">↑ Linha subindo é sempre coisa boa. Todas as escalas seguem a mesma direção.<\u002Fdiv>';\n  var pesoBody=lineChartSVG(pesoData,[{key:\"peso\",name:\"Peso\",color:\"#4A3220\"}],{auto:true,unit:\" kg\"})+'<div class=\"chart-note\">Peso é contexto, não veredito. Leia sempre junto com adesão, sono e digestão.<\u002Fdiv>';\n  return '<div class=\"stack\">'+panel(\"Indicadores no tempo\",'<span class=\"mono\" style=\"font-size:11px;color:#8A7B65\">escala 0 a 10<\u002Fspan>',evoBody)+panel(\"Peso (kg)\",'<span class=\"mono\" style=\"font-size:11px;color:#8A7B65\">objetivo: '+esc(p.objetivo)+'<\u002Fspan>',pesoBody)+'<\u002Fdiv>';\n}\n\n/* ---------- Settings ---------- */\nfunction viewSettings(){\n  return '<div class=\"page\"><div class=\"page-head\"><span class=\"eyebrow\">Configuração<\u002Fspan><h1>Ajustes<\u002Fh1><\u002Fdiv>'+\n    '<div class=\"panel\" style=\"max-width:640px\"><div class=\"panel-b\" style=\"padding:22px\"><h3 style=\"font-size:17px;margin-bottom:6px\">Dados<\u002Fh3><p style=\"font-size:14px;color:#8A7B65;margin-bottom:16px\">Este protótipo salva tudo no seu navegador e mantém os dados entre sessões quando você abre o arquivo ou o hospeda. Use o botão abaixo para recomeçar com dados de exemplo.<\u002Fp><button class=\"btn primary\" data-action=\"resetDemo\">Restaurar dados de exemplo<\u002Fbutton><\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"panel\" style=\"max-width:640px;margin-top:16px\"><div class=\"panel-b\" style=\"padding:22px\"><h3 style=\"font-size:17px;margin-bottom:6px\">Como o check-in funciona<\u002Fh3><p style=\"font-size:14px;color:#8A7B65\">Ele tem três camadas: o <b style=\"color:#4A3220\">onboarding<\u002Fb> é preenchido uma vez (peso inicial, sono habitual, treino planejado, meta de água). O <b style=\"color:#4A3220\">check-in semanal<\u002Fb> pede só o que muda. E as <b style=\"color:#4A3220\">perguntas condicionais<\u002Fb> só aparecem quando um indicador cai, para o paciente responder rápido nas semanas boas.<\u002Fp><\u002Fdiv><\u002Fdiv>'+\n  '<\u002Fdiv>';\n}\n\n/* ---------- Patient area ---------- */\nfunction viewPatientArea(){\n  var p=currentPatient();\n  if(!p) return '<div class=\"page\"><div class=\"emptynote\">Nenhum paciente cadastrado.<\u002Fdiv><\u002Fdiv>';\n  if(S.pmode===\"done\"){\n    return '<div class=\"page\"><div class=\"donescreen\"><div class=\"ic\">'+IC.check+'<\u002Fdiv><h2>Recebido, '+esc(p.name.split(\" \")[0])+'!<\u002Fh2><p>Suas respostas já estão com a nutricionista. Ela vai analisar e te dar um retorno em breve. Bom descanso e uma ótima semana.<\u002Fp><button class=\"btn ghost\" style=\"margin-top:22px\" data-action=\"backHome\">Voltar ao início<\u002Fbutton><\u002Fdiv><\u002Fdiv>';\n  }\n  if(S.pmode===\"checkin\") return checkinFlow(p);\n\n  var l=latest(p.id);\n  var thisWeek=lastSundays(1)[0];\n  var done=S.checkins.some(function(c){return c.patientId===p.id&&c.answered&&fmtDay(new Date(c.date))===fmtDay(thisWeek);});\n  var options=S.patients.map(function(x){return '<option value=\"'+x.id+'\"'+(x.id===p.id?\" selected\":\"\")+'>'+esc(x.name)+'<\u002Foption>';}).join(\"\");\n  var mainCard = done\n    ? '<div class=\"sect\" style=\"text-align:center\"><div class=\"stt\">Check-in desta semana já enviado<\u002Fdiv><p class=\"sst\" style=\"margin-bottom:16px\">Obrigada por responder. Você pode refazer se quiser atualizar algo.<\u002Fp><button class=\"btn ghost\" data-action=\"startCheckin\">Refazer check-in<\u002Fbutton><\u002Fdiv>'\n    : '<div class=\"sect\" style=\"text-align:center\"><div class=\"stt\">Pronto para começar?<\u002Fdiv><p class=\"sst\" style=\"margin-bottom:18px\">Sem pressa. Cada resposta ajuda a deixar seu plano com a sua cara.<\u002Fp><button class=\"btn primary\" data-action=\"startCheckin\">Iniciar check-in da semana<\u002Fbutton><\u002Fdiv>';\n  var recado = (l&&l.nutriComment)? '<div class=\"sect\"><div class=\"stt\" style=\"font-size:16px\">Recado da sua nutri<\u002Fdiv><div class=\"qbox\" style=\"margin-top:10px\">“'+esc(l.nutriComment)+'”<\u002Fdiv><\u002Fdiv>' : \"\";\n  return '<div class=\"page\">'+\n    '<div class=\"selectrow\"><span class=\"mono\" style=\"font-size:11px;color:#8A7B65;letter-spacing:.08em\">SIMULANDO PACIENTE:<\u002Fspan><select style=\"width:auto\" data-action=\"selPatient\">'+options+'<\u002Fselect><\u002Fdiv>'+\n    '<div class=\"flow\"><div class=\"intro\"><span class=\"eyebrow\" style=\"color:#E0C7A0\">Acompanhamento da semana<\u002Fspan><h2 style=\"margin-top:8px\">Olá, '+esc(p.name.split(\" \")[0])+'!<\u002Fh2><p>Chegamos ao nosso check-in da semana. São uns 3 minutinhos, respondendo com sinceridade. É isso que me ajuda a entender como você está e ajustar seu plano.<\u002Fp><\u002Fdiv>'+mainCard+recado+'<\u002Fdiv>'+\n  '<\u002Fdiv>';\n}\n\n/* ---------- Check-in flow ---------- */\nfunction sliderHTML(ind,val){\n  var col=val>=7?ind.color:(val>=5?\"#E0A32E\":\"#BC5443\");\n  return '<div class=\"q\"><div class=\"ql\"><span>'+ind.label+'<\u002Fspan><span class=\"qv\" id=\"qv-'+ind.key+'\" style=\"color:'+col+'\">'+val+'<\u002Fspan><\u002Fdiv>'+\n    '<input type=\"range\" min=\"0\" max=\"10\" value=\"'+val+'\" data-ind=\"'+ind.key+'\" style=\"background:linear-gradient(90deg, '+col+' '+(val*10)+'%, #E4D8C2 '+(val*10)+'%)\">'+\n    '<div class=\"hintrow\"><span>0 · '+ind.low+'<\u002Fspan><span>'+ind.high+' · 10<\u002Fspan><\u002Fdiv><\u002Fdiv>';\n}\nfunction checkinFlow(p){\n  var ob=p.onboarding;\n  var s=S.draft.scores;\n  return '<div class=\"page\"><div class=\"flow\">'+\n    '<button class=\"linkbtn\" data-action=\"cancelCheckin\" style=\"margin-bottom:12px\">← cancelar<\u002Fbutton>'+\n    '<div class=\"sect\"><div class=\"stt\">Seu corpo<\u002Fdiv><div class=\"sst\">Variações de peso sozinhas não dizem se você avançou. Leia sempre com o resto.<\u002Fdiv>'+\n      '<div class=\"numrow\"><div class=\"field\"><label>Peso atual (kg)<\u002Flabel><input type=\"number\" step=\"0.1\" value=\"'+S.draft.peso+'\" data-field=\"peso\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"sect\"><div class=\"stt\">Alimentação e adesão<\u002Fdiv><div class=\"sst\">O coração do check-in. Seja sincero, é o que me deixa te ajudar melhor.<\u002Fdiv>'+\n      sliderHTML(IND_MAP.adesao,s.adesao)+\n      '<div class=\"cond\" id=\"cond-adesao\" style=\"display:'+(s.adesao<=5?\"block\":\"none\")+'\"><div class=\"cl\">'+IC.alert+' Em qual situação foi mais difícil seguir?<\u002Fdiv><textarea rows=\"2\" data-field=\"fAdesao\" placeholder=\"Ex: fins de semana, jantar fora, ansiedade à noite…\">'+esc(S.draft.fAdesao)+'<\u002Ftextarea><\u002Fdiv>'+\n      sliderHTML(IND_MAP.saciedade,s.saciedade)+sliderHTML(IND_MAP.controle,s.controle)+sliderHTML(IND_MAP.agua,s.agua)+'<\u002Fdiv>'+\n    '<div class=\"sect\"><div class=\"stt\">Treino e recuperação<\u002Fdiv><div class=\"sst\">Sua meta combinada é '+ob.treinoPlanejado+' treinos na semana.<\u002Fdiv>'+\n      '<div class=\"numrow\"><div class=\"field\"><label>Treinos que você fez<\u002Flabel><input type=\"number\" min=\"0\" max=\"14\" value=\"'+S.draft.treinos+'\" data-field=\"treinos\"><\u002Fdiv><\u002Fdiv>'+\n      '<div class=\"cond\" id=\"cond-treino\" style=\"display:'+((+S.draft.treinos)<ob.treinoPlanejado?\"block\":\"none\")+'\"><div class=\"cl\">'+IC.alert+' O que impediu os treinos que faltaram?<\u002Fdiv><textarea rows=\"2\" data-field=\"fTreino\" placeholder=\"Ex: correria no trabalho, cansaço, dor…\">'+esc(S.draft.fTreino)+'<\u002Ftextarea><\u002Fdiv>'+\n      sliderHTML(IND_MAP.recuperacao,s.recuperacao)+'<\u002Fdiv>'+\n    '<div class=\"sect\"><div class=\"stt\">Bem-estar<\u002Fdiv><div class=\"sst\">Digestão, sono e humor conversam entre si e com a sua alimentação.<\u002Fdiv>'+\n      sliderHTML(IND_MAP.digestao,s.digestao)+sliderHTML(IND_MAP.sono,s.sono)+\n      '<div class=\"cond\" id=\"cond-sono\" style=\"display:'+(s.sono<=5?\"block\":\"none\")+'\"><div class=\"cl\">'+IC.alert+' O que mudou no seu sono?<\u002Fdiv><textarea rows=\"2\" data-field=\"fSono\" placeholder=\"Ex: dormi menos, acordei no meio da noite, dormi mais tarde…\">'+esc(S.draft.fSono)+'<\u002Ftextarea><\u002Fdiv>'+\n      sliderHTML(IND_MAP.humor,s.humor)+sliderHTML(IND_MAP.tranquilidade,s.tranquilidade)+'<\u002Fdiv>'+\n    '<div class=\"sect\"><div class=\"stt\">Fechamento<\u002Fdiv><div class=\"sst\">Quase lá. Só mais um panorama geral.<\u002Fdiv>'+\n      sliderHTML(IND_MAP.geral,s.geral)+\n      '<div class=\"field\" style=\"margin-top:8px\"><label>O que foi destaque e o que mais atrapalhou essa semana?<\u002Flabel><textarea rows=\"3\" data-field=\"texto\" placeholder=\"Escreva à vontade, em poucas linhas.\">'+esc(S.draft.texto)+'<\u002Ftextarea><\u002Fdiv>'+\n      '<div class=\"toggle'+(S.draft.alertOn?\" on\":\"\")+'\" id=\"alert-toggle\" data-action=\"toggleAlert\"><div class=\"sw\"><\u002Fdiv><div><div class=\"tl\">Sentiu dor, mal-estar ou algo que te preocupou?<\u002Fdiv><div style=\"font-size:12px;color:#8A7B65\">Se sim, isso vai direto para o topo da lista da sua nutri.<\u002Fdiv><\u002Fdiv><\u002Fdiv>'+\n      '<div class=\"field\" id=\"alert-field\" style=\"margin-top:12px;display:'+(S.draft.alertOn?\"block\":\"none\")+'\"><label>Conte o que aconteceu<\u002Flabel><textarea rows=\"2\" data-field=\"alertTxt\" placeholder=\"Ex: enjoo, dor de cabeça, refluxo, tontura…\">'+esc(S.draft.alertTxt)+'<\u002Ftextarea><\u002Fdiv><\u002Fdiv>'+\n    '<div style=\"display:flex;gap:10px;justify-content:flex-end;margin-bottom:40px\"><button class=\"btn ghost\" data-action=\"cancelCheckin\">Cancelar<\u002Fbutton><button class=\"btn primary\" data-action=\"submitCheckin\">Enviar check-in<\u002Fbutton><\u002Fdiv>'+\n  '<\u002Fdiv><\u002Fdiv>';\n}\n\n/* ---------- Modal ---------- */\nfunction opt2(pairs,val){ return pairs.map(function(o){return '<option value=\"'+o[0]+'\"'+(o[0]===val?' selected':'')+'>'+o[1]+'<\u002Foption>';}).join(\"\"); }\nfunction modalPatientForm(){\n  var editing=!!S.editId; var p=editing?pOf(S.editId):null; var ob=p?p.onboarding:{};\n  function opt(list,val){ return list.map(function(o){return '<option'+(o===val?' selected':'')+'>'+o+'<\u002Foption>';}).join(\"\"); }\n  var objs=[\"Emagrecimento\",\"Hipertrofia\",\"Recomposição corporal\",\"Reeducação alimentar\",\"Saúde e performance\"];\n  var planos=[\"Premium 1 mês\",\"Premium 3 meses\",\"Platinum 6 meses\",\"Platinum 1 ano\"];\n  var vencDias=p?Math.max(0,Math.round((new Date(p.vencimento).getTime()-Date.now())/86400000)):90;\n  return '<div class=\"modal-bg\" data-action=\"closeModalBg\"><div class=\"modal\"><div class=\"modal-h\"><h3>'+(editing?\"Editar paciente\":\"Novo paciente\")+'<\u002Fh3><button class=\"x\" data-action=\"closeModal\">×<\u002Fbutton><\u002Fdiv>'+\n    '<div class=\"modal-b\">'+\n      '<div class=\"field\"><label>Nome completo<\u002Flabel><input id=\"np-name\" placeholder=\"Ex: Maria Oliveira\" value=\"'+(p?esc(p.name):\"\")+'\"><\u002Fdiv>'+\n      '<div class=\"numrow\"><div class=\"field\"><label>Objetivo<\u002Flabel><select id=\"np-obj\">'+opt(objs,p?p.objetivo:\"\")+'<\u002Fselect><\u002Fdiv>'+\n      '<div class=\"field\"><label>Plano<\u002Flabel><select id=\"np-plano\">'+opt(planos,p?p.plano:\"\")+'<\u002Fselect><\u002Fdiv>'+\n      '<div class=\"field\"><label>Status<\u002Flabel><select id=\"np-status\">'+opt2([[\"ativo\",\"Ativo\"],[\"pausado\",\"Pausado\"],[\"arquivado\",\"Arquivado\"]],p?(p.status||\"ativo\"):\"ativo\")+'<\u002Fselect><\u002Fdiv><\u002Fdiv>'+\n      '<div class=\"numrow\"><div class=\"field\"><label>Peso inicial (kg)<\u002Flabel><input id=\"np-peso\" type=\"number\" step=\"0.1\" value=\"'+(p?ob.pesoInicial:70)+'\"><\u002Fdiv><div class=\"field\"><label>Altura (m)<\u002Flabel><input id=\"np-alt\" type=\"number\" step=\"0.01\" value=\"'+(p?ob.altura:\"1.70\")+'\"><\u002Fdiv><\u002Fdiv>'+\n      '<div class=\"numrow\"><div class=\"field\"><label>Treinos / semana<\u002Flabel><input id=\"np-tr\" type=\"number\" value=\"'+(p?ob.treinoPlanejado:4)+'\"><\u002Fdiv><div class=\"field\"><label>Meta de água (L)<\u002Flabel><input id=\"np-ag\" type=\"number\" step=\"0.1\" value=\"'+(p?ob.metaAgua:2.5)+'\"><\u002Fdiv><div class=\"field\"><label>Vence em (dias)<\u002Flabel><input id=\"np-venc\" type=\"number\" value=\"'+vencDias+'\"><\u002Fdiv><\u002Fdiv>'+\n      '<div class=\"field\"><label>Sono habitual<\u002Flabel><input id=\"np-sono\" placeholder=\"Ex: 7 a 8h, dorme ~23h\" value=\"'+(p?esc(ob.sonoHabitual||\"\"):\"\")+'\"><\u002Fdiv>'+\n      '<div class=\"field\"><label>Restrições / observações<\u002Flabel><input id=\"np-restr\" placeholder=\"Ex: sem lactose, vegetariano…\" value=\"'+(p?esc(ob.restricoes||\"\"):\"\")+'\"><\u002Fdiv>'+\n      '<div class=\"field\"><label>Tags (separe por vírgula)<\u002Flabel><input id=\"np-tags\" placeholder=\"Ex: pós-bariátrica, atleta, gestante\" value=\"'+(p&&p.tags?esc(p.tags.join(\", \")):\"\")+'\"><\u002Fdiv>'+\n      '<div class=\"field\"><label>Anotações particulares (só você vê)<\u002Flabel><textarea id=\"np-notes\" rows=\"2\" placeholder=\"Histórico, preferências, pontos de atenção…\">'+(p&&p.notes?esc(p.notes):\"\")+'<\u002Ftextarea><\u002Fdiv>'+\n    '<\u002Fdiv>'+\n    '<div class=\"modal-f\">'+(editing?'<button class=\"btn ghost\" data-action=\"delPatient\" data-id=\"'+p.id+'\" style=\"margin-right:auto;color:#BC5443;border-color:#ecc9c1\">Excluir<\u002Fbutton>':'')+'<button class=\"btn ghost\" data-action=\"closeModal\">Cancelar<\u002Fbutton><button class=\"btn primary\" data-action=\"savePatient\">'+(editing?\"Salvar alterações\":\"Cadastrar paciente\")+'<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n}\n\n/* ============================================================\n   ACTIONS\n   ============================================================ */\nfunction toast(m){ var t=document.getElementById(\"toast\"); t.textContent=m; t.classList.add(\"show\"); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove(\"show\");},2600); }\n\nfunction moveTriage(cid,to){ S.checkins=S.checkins.map(function(c){return c.id===cid?Object.assign({},c,{triageStatus:to}):c;}); persist(); }\n\nfunction submitCheckin(){\n  var p=currentPatient(); var ob=p.onboarding; var d=S.draft;\n  var thisWeek=lastSundays(1)[0];\n  var followups={};\n  if(d.scores.sono<=5 && d.fSono) followups.sono=d.fSono;\n  if(d.scores.adesao<=5 && d.fAdesao) followups.adesao=d.fAdesao;\n  if((+d.treinos)<ob.treinoPlanejado && d.fTreino) followups.treino=d.fTreino;\n  var rec={patientId:p.id,date:thisWeek.toISOString(),scores:Object.assign({},d.scores),\n    metrics:{peso:+d.peso,treinosFeitos:+d.treinos,treinoPlanejado:ob.treinoPlanejado},\n    texto:d.texto,followups:followups,alerta:{flag:d.alertOn,texto:d.alertOn?d.alertTxt:\"\"},\n    answered:true,triageStatus:\"respondido\",nutriComment:\"\"};\n  var idx=S.checkins.findIndex(function(c){return c.patientId===p.id && fmtDay(new Date(c.date))===fmtDay(thisWeek);});\n  if(idx>=0){ rec.id=S.checkins[idx].id; S.checkins=S.checkins.map(function(c,i){return i===idx?rec:c;}); }\n  else { rec.id=p.id+\"-live-\"+Date.now(); S.checkins=S.checkins.concat([rec]); }\n  var al=activeLink(p.id); if(al){ S.links=S.links.map(function(l){return l.id===al.id?Object.assign({},l,{status:\"respondido\"}):l;}); }\n  persist(); S.pmode=\"done\"; render(); toast(\"Check-in enviado — link marcado como respondido.\");\n}\n\nfunction readNewPatient(){\n  var name=(document.getElementById(\"np-name\").value||\"\").trim();\n  if(name.length<2){ toast(\"Informe o nome do paciente.\"); return; }\n  var venc=new Date(); venc.setDate(venc.getDate()+(+document.getElementById(\"np-venc\").value||90));\n  var np={id:\"p\"+Date.now(),name:name,objetivo:document.getElementById(\"np-obj\").value,plano:document.getElementById(\"np-plano\").value,\n    color:AVCOL[Math.floor(Math.random()*AVCOL.length)],status:\"ativo\",inicio:new Date().toISOString(),vencimento:venc.toISOString(),\n    onboarding:{pesoInicial:+document.getElementById(\"np-peso\").value,altura:+document.getElementById(\"np-alt\").value,sonoHabitual:\"a definir\",\n      treinoPlanejado:+document.getElementById(\"np-tr\").value,metaAgua:+document.getElementById(\"np-ag\").value,restricoes:document.getElementById(\"np-restr\").value||\"Nenhuma\"}};\n  S.patients=S.patients.concat([np]); persist(); S.modal=null; render(); toast(\"Paciente cadastrado.\");\n}\n\nfunction savePatient(){\n  var name=(document.getElementById(\"np-name\").value||\"\").trim();\n  if(name.length<2){ toast(\"Informe o nome do paciente.\"); return; }\n  var venc=new Date(); venc.setDate(venc.getDate()+(+document.getElementById(\"np-venc\").value||90));\n  var tags=(document.getElementById(\"np-tags\").value||\"\").split(\",\").map(function(s){return s.trim();}).filter(Boolean);\n  var notes=document.getElementById(\"np-notes\").value||\"\";\n  var status=document.getElementById(\"np-status\").value||\"ativo\";\n  var ob={pesoInicial:+document.getElementById(\"np-peso\").value,altura:+document.getElementById(\"np-alt\").value,sonoHabitual:document.getElementById(\"np-sono\").value||\"a definir\",treinoPlanejado:+document.getElementById(\"np-tr\").value,metaAgua:+document.getElementById(\"np-ag\").value,restricoes:document.getElementById(\"np-restr\").value||\"Nenhuma\"};\n  if(S.editId){\n    S.patients=S.patients.map(function(p){ return p.id===S.editId?Object.assign({},p,{name:name,objetivo:document.getElementById(\"np-obj\").value,plano:document.getElementById(\"np-plano\").value,status:status,vencimento:venc.toISOString(),tags:tags,notes:notes,onboarding:Object.assign({},p.onboarding,ob)}):p; });\n    persist(); S.modal=null; S.editId=null; render(); toast(\"Paciente atualizado.\");\n  } else {\n    var np={id:\"p\"+Date.now(),name:name,objetivo:document.getElementById(\"np-obj\").value,plano:document.getElementById(\"np-plano\").value,color:AVCOL[Math.floor(Math.random()*AVCOL.length)],status:status,inicio:new Date().toISOString(),vencimento:venc.toISOString(),tags:tags,notes:notes,onboarding:ob};\n    S.patients=S.patients.concat([np]); persist(); S.modal=null; render(); toast(\"Paciente cadastrado.\");\n  }\n}\nfunction archivePatient(id){ S.patients=S.patients.map(function(p){return p.id===id?Object.assign({},p,{status:\"arquivado\"}):p;}); persist(); render(); toast(\"Paciente arquivado.\"); }\nfunction restorePatient(id){ S.patients=S.patients.map(function(p){return p.id===id?Object.assign({},p,{status:\"ativo\"}):p;}); persist(); render(); toast(\"Paciente reativado.\"); }\nfunction deletePatient(id){\n  var p=pOf(id); if(!p) return;\n  if(!window.confirm(\"Excluir \"+p.name+\" e TODOS os check-ins e links dele? Esta ação não pode ser desfeita.\")) return;\n  S.patients=S.patients.filter(function(x){return x.id!==id;});\n  S.checkins=S.checkins.filter(function(c){return c.patientId!==id;});\n  S.links=S.links.filter(function(l){return l.patientId!==id;});\n  if(S.selId===id) S.selId=null; if(S.editId===id){ S.editId=null; S.modal=null; }\n  S.view=\"pacientes\"; persist(); render(); toast(\"Paciente excluído.\");\n}\n\nfunction handleAction(action,id){\n  switch(action){\n    case \"role\": S.role=id; if(id===\"nutri\"){S.view=\"dashboard\";} else if(!S.selId&&S.patients[0]){S.selId=S.patients[0].id;} S.pmode=\"home\"; render(); break;\n    case \"view\": S.view=id; render(); break;\n    case \"open\": S.selId=id; S.view=\"ficha\"; S.tab=\"visao\"; S.openHist=null; render(); break;\n    case \"back\": S.view=\"pacientes\"; render(); break;\n    case \"tab\": S.tab=id; render(); break;\n    case \"addPatient\": S.editId=null; S.modal=\"patientForm\"; renderModal(); break;\n    case \"editPatient\": S.editId=id; S.modal=\"patientForm\"; renderModal(); break;\n    case \"savePatient\": savePatient(); break;\n    case \"archivePatient\": archivePatient(id); break;\n    case \"restorePatient\": restorePatient(id); break;\n    case \"delPatient\": deletePatient(id); break;\n    case \"patStatus\": S.patFilter.status=id; render(); break;\n    case \"closeModal\": case \"closeModalBg\": S.modal=null; S.editId=null; renderModal(); break;\n    case \"createPatient\": savePatient(); break;\n    case \"resetDemo\": var s=buildSeed(); S.patients=s.patients; S.checkins=s.checkins; persist(); S.view=\"dashboard\"; S.selId=null; render(); toast(\"Dados de exemplo restaurados.\"); break;\n    case \"toggleHist\": S.openHist=(S.openHist===id?null:id); render(); break;\n    case \"markAnalisado\": moveTriage(id,\"analisado\"); render(); break;\n    case \"delLink\": deleteLink(id); break;\n    case \"delCheckin\": deleteCheckin(id); break;\n    case \"clearExpired\": clearExpiredLinks(); break;\n    case \"dlCheckinHTML\": downloadCheckinHTML(id); break;\n    case \"openImport\": S.modal=\"importResp\"; renderModal(); break;\n    case \"doImport\": importResposta(); break;\n    case \"chip\": var i=S.evoSel.indexOf(id); if(i>=0) S.evoSel.splice(i,1); else S.evoSel.push(id); render(); break;\n    case \"preset\": S.evoSel=id.split(\",\"); render(); break;\n    case \"selPatient\": break; // handled on change\n    case \"startCheckin\": var p=currentPatient(); var ob=p.onboarding; var sc={}; INDICATORS.forEach(function(x){sc[x.key]=7;}); S.draft={scores:sc,peso:ob.pesoInicial,treinos:ob.treinoPlanejado,texto:\"\",fSono:\"\",fAdesao:\"\",fTreino:\"\",alertOn:false,alertTxt:\"\"}; S.pmode=\"checkin\"; render(); window.scrollTo(0,0); break;\n    case \"cancelCheckin\": S.pmode=\"home\"; render(); break;\n    case \"submitCheckin\": submitCheckin(); break;\n    case \"backHome\": S.pmode=\"home\"; render(); break;\n    case \"redoCheckin\": S.pmode=\"checkin\"; render(); break;\n    case \"genLink\": doGenLink(id); break;\n    case \"genLinkSel\": var _sel=document.getElementById(\"lk-pat\"); doGenLink(_sel?_sel.value:null); break;\n    case \"openLink\": S.linkId=id; S.modal=\"linkGen\"; renderModal(); break;\n    case \"markSent\": S.links=S.links.map(function(l){return l.id===id?Object.assign({},l,{status:\"enviado\"}):l;}); persist(); render(); toast(\"Link marcado como enviado.\"); break;\n    case \"copyLink\": doCopyLink(id); break;\n    case \"openCheckinPreview\":\n      var _lk=S.links.filter(function(x){return x.id===id;})[0]; if(!_lk) break;\n      var _pp=pOf(_lk.patientId); if(!_pp) break;\n      S.modal=null; S.linkId=null; S.role=\"paciente\"; S.selId=_lk.patientId; S._viaLink=_lk.id;\n      var _ob=_pp.onboarding, _sc={}; INDICATORS.forEach(function(x){_sc[x.key]=7;});\n      S.draft={scores:_sc,peso:_ob.pesoInicial,treinos:_ob.treinoPlanejado,texto:\"\",fSono:\"\",fAdesao:\"\",fTreino:\"\",alertOn:false,alertTxt:\"\"};\n      S.pmode=\"checkin\"; render(); window.scrollTo(0,0); toast(\"Abrindo o check-in como o paciente vê.\"); break;\n    case \"toggleAlert\":\n      S.draft.alertOn=!S.draft.alertOn;\n      var tg=document.getElementById(\"alert-toggle\"); if(tg) tg.classList.toggle(\"on\",S.draft.alertOn);\n      var af=document.getElementById(\"alert-field\"); if(af) af.style.display=S.draft.alertOn?\"block\":\"none\";\n      break;\n  }\n}\n\n/* ---------- input handling (no re-render, keeps focus) ---------- */\nfunction onInput(e){\n  var r=e.target;\n  if(r.id===\"pat-search\"){ S.patFilter.q=r.value; var tb=document.querySelector(\"table.tbl tbody\"); if(tb) tb.innerHTML=patientRowsHTML(); return; }\n  if(r.matches && r.matches('input[type=range][data-ind]')){\n    var k=r.getAttribute(\"data-ind\"); var v=+r.value; S.draft.scores[k]=v;\n    var col=v>=7?IND_MAP[k].color:(v>=5?\"#E0A32E\":\"#BC5443\");\n    r.style.background=\"linear-gradient(90deg, \"+col+\" \"+(v*10)+\"%, #E4D8C2 \"+(v*10)+\"%)\";\n    var lab=document.getElementById(\"qv-\"+k); if(lab){ lab.textContent=v; lab.style.color=col; }\n    if(k===\"adesao\"){ var ca=document.getElementById(\"cond-adesao\"); if(ca) ca.style.display=v<=5?\"block\":\"none\"; }\n    if(k===\"sono\"){ var cs=document.getElementById(\"cond-sono\"); if(cs) cs.style.display=v<=5?\"block\":\"none\"; }\n    return;\n  }\n  if(!S.draft) { return; }\n  var f=r.getAttribute && r.getAttribute(\"data-field\");\n  if(f===\"peso\"){ S.draft.peso=r.value; }\n  else if(f===\"treinos\"){ S.draft.treinos=r.value; var planned=currentPatient().onboarding.treinoPlanejado; var ct=document.getElementById(\"cond-treino\"); if(ct) ct.style.display=(+r.value)<planned?\"block\":\"none\"; }\n  else if(f){ S.draft[f]=r.value; }\n}\nfunction onChange(e){\n  var r=e.target;\n  if(r.getAttribute && r.getAttribute(\"data-action\")===\"selPatient\"){ S.selId=r.value; S.pmode=\"home\"; render(); return; }\n  if(r.getAttribute && r.getAttribute(\"data-action\")===\"patObj\"){ S.patFilter.obj=r.value; render(); return; }\n  if(r.getAttribute && r.getAttribute(\"data-action\")===\"patSort\"){ S.patFilter.sort=r.value; render(); return; }\n  if(r.getAttribute && r.getAttribute(\"data-action\")===\"patNotes\"){ var pid=r.getAttribute(\"data-id\"), v=r.value; S.patients=S.patients.map(function(p){return p.id===pid?Object.assign({},p,{notes:v}):p;}); persist(); return; }\n  if(r.getAttribute && r.getAttribute(\"data-action\")===\"comment\"){\n    var cid=r.getAttribute(\"data-id\"); var val=r.value;\n    S.checkins=S.checkins.map(function(c){return c.id===cid?Object.assign({},c,{nutriComment:val}):c;}); persist();\n  }\n}\n\n/* ---------- wire up (delegation, attached once on #root) ---------- */\nfunction init(){\n  loadOrSeed();\n  routeFromHash();\n  var root=document.getElementById(\"root\");\n  root.addEventListener(\"click\",function(e){\n    var t=e.target.closest(\"[data-action]\"); if(!t) return;\n    var act=t.getAttribute(\"data-action\");\n    if(act===\"selPatient\"||act===\"comment\"||act===\"patObj\"||act===\"patSort\"||act===\"patNotes\") return; // handled on change/input\n    // background click closes modal only if clicking the bg itself\n    if(act===\"closeModalBg\" && e.target!==t) return;\n    handleAction(act,t.getAttribute(\"data-id\"));\n  });\n  root.addEventListener(\"input\",onInput);\n  root.addEventListener(\"change\",onChange);\n  // sync ao vivo: quando um paciente responde pelo link (checkin.html), a resposta chega aqui\n  window.addEventListener(\"storage\",function(e){\n    if(!e.key || !/^raiz:/.test(e.key)) return;\n    try{\n      var rp=store.get(\"raiz:patients\"),rc=store.get(\"raiz:checkins\"),rl=store.get(\"raiz:links\");\n      if(rp) S.patients=JSON.parse(rp); if(rc) S.checkins=JSON.parse(rc); if(rl) S.links=JSON.parse(rl);\n      expireLinks(); render();\n      if(e.key===\"raiz:checkins\") toast(\"Novo check-in recebido de um paciente.\");\n    }catch(err){}\n  });\n  // drag & drop (kanban)\n  var app=document.getElementById(\"app\");\n  app.addEventListener(\"dragstart\",function(e){ var c=e.target.closest(\".kcard\"); if(c) S.dragId=c.getAttribute(\"data-cid\"); });\n  app.addEventListener(\"dragover\",function(e){ var col=e.target.closest(\".kcol\"); if(col){ e.preventDefault(); col.classList.add(\"over\"); } });\n  app.addEventListener(\"dragleave\",function(e){ var col=e.target.closest(\".kcol\"); if(col && !col.contains(e.relatedTarget)) col.classList.remove(\"over\"); });\n  app.addEventListener(\"drop\",function(e){ var col=e.target.closest(\".kcol\"); if(col && S.dragId){ e.preventDefault(); moveTriage(S.dragId,col.getAttribute(\"data-col\")); S.dragId=null; render(); } });\n  render();\n}\nif(document.readyState===\"loading\"){document.addEventListener(\"DOMContentLoaded\",init);}else{init();}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
